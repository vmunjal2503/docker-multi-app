<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Site — Docker Multi-App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { font-size: 1.1rem; line-height: 1.6; color: #94a3b8; margin-bottom: 1.5rem; }
        .badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 0.25rem;
        }
        .status { color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Static Site</h1>
        <p>Served via <strong>Nginx Reverse Proxy</strong> inside a Docker container.</p>
        <p>This is App 3 in the multi-app Docker Compose setup.</p>
        <div>
            <span class="badge"><span class="status">●</span> Nginx Proxy</span>
            <span class="badge"><span class="status">●</span> Docker</span>
            <span class="badge"><span class="status">●</span> SSL Ready</span>
        </div>
    </div>
</body>
</html>
